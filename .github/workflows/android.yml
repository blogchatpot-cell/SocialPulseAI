name: Final Build Social Tech
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Full Auto Setup
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www && echo "<html><head><meta charset='UTF-8'></head><body><h1>سوشيال تك - جاري التحميل...</h1></body></html>" > www/index.html
          npx cap init "Social Tech" com.socialpulseai.app --web-dir www
          npx cap add android

      - name: Grant Permissions & Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: SocialTech-Success-APK
          path: android/app/build/outputs/apk/debug/*
