name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Web Directory
        run: |
          mkdir -p www
          echo "<html><body>Social Tech Online</body></html>" > www/index.html

      - name: Setup Android Project
        run: |
          npm install -g @capacitor/cli @capacitor/android
          npx cap add android || true
          
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ../SocialTech.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SocialPulseAI-Debug
          path: ./SocialTech.apk
